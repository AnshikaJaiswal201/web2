<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cards Using Bootstrap Grid System </title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
</head>

<body>
    <div class="container mt-4">
        <div class="row">
            <!-- Card 1 -->
            <div class="col-md-4">
                <div class="card">
                    <img src="card1.png" class="card-img-top" alt="Card Image">
                    <div class="card-body">
                        <h5 class="card-title">Card One</h5>
                        <p class="card-text">This is a simple card with supporting text.</p>
                        <a href="#" class="btn btn-primary">Read More</a>
                    </div>
                </div>
            </div>

            <!-- Card 2 -->
            <div class="col-md-4">
                <div class="card">
                    <img src="card2.png" class="card-img-top" alt="Card Image">
                    <div class="card-body">
                        <h5 class="card-title">Card Two</h5>
                        <p class="card-text">Another card with some content inside.</p>
                        <a href="#" class="btn btn-success">Explore</a>
                    </div>
                </div>
            </div>

            <!-- Card 3 -->
            <div class="col-md-4">
                <div class="card">
                    <img src="card3.png" class="card-img-top" alt="Card Image">
                    <div class="card-body">
                        <h5 class="card-title">Card Three</h5>
                        <p class="card-text">Cards are flexible and easy to use.</p>
                        <a href="#" class="btn btn-danger">Details</a>
                    </div>
                </div>
            </div>
        </div>
    </div>
</body>

</html>
